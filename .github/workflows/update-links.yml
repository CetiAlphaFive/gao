name: Update GAO Links

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 6am UTC
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install curl-impersonate
        run: |
          curl -L -o curl-impersonate.tar.gz \
            https://github.com/lexiforest/curl-impersonate/releases/download/v1.5.1/curl-impersonate-v1.5.1.x86_64-linux-gnu.tar.gz
          mkdir -p $HOME/.local/bin
          tar -xzf curl-impersonate.tar.gz -C $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          curl_firefox147 --version

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::remotes, any::pdftools

      - name: Update links and backfill metadata
        run: |
          library(gao)
          known <- gao_links()
          updated <- update_links(verbose = TRUE, sleep_time = 1)
          n.new <- nrow(updated) - nrow(known)

          if (n.new > 0) {
            new.idx <- which(!updated$url %in% known$url)
            tmp.dir <- tempdir()

            for (i in new.idx) {
              report.url <- updated$url[i]

              ## Backfill metadata from individual report page
              tryCatch({
                page <- gao:::.fetch_html(report.url)
                meta <- gao:::.scrape_report_metadata(page)
                if (!is.na(meta$topics))
                  updated$topics[i] <- meta$topics
                if (!is.na(meta$subject_terms))
                  updated$subject_terms[i] <- meta$subject_terms
                updated$has_recommendations[i] <- meta$has_recommendations
                updated$n_recommendations[i] <- meta$n_recommendations
                updated$has_matters[i] <- meta$has_matters
                updated$n_matters[i] <- meta$n_matters
                if (!is.na(meta$agencies_affected))
                  updated$agencies_affected[i] <- meta$agencies_affected
              }, error = function(e) {
                message("metadata failed for ", report.url, ": ", e$message)
              })
              Sys.sleep(1)

              ## Backfill page_count from PDF
              pdf.url <- paste0(
                sub("/products/", "/assets/", report.url), ".pdf"
              )
              pdf.path <- file.path(tmp.dir, basename(pdf.url))
              tryCatch({
                download_pdfs(pdf.url, download_dir = tmp.dir, sleep_time = 1)
                if (file.exists(pdf.path)) {
                  updated$page_count[i] <- pdftools::pdf_length(pdf.path)
                  unlink(pdf.path)
                }
              }, error = function(e) {
                message("page_count failed for ", report.url, ": ", e$message)
              })
            }

            ## Expand indicator columns for new rows
            updated <- gao:::.expand_indicators(updated)

            saveRDS(updated, "inst/extdata/gao_links.rds")
            message("Added ", n.new, " new reports")
          } else {
            message("No new reports found")
          }
          # Write output for conditional commit step
          writeLines(as.character(n.new), "n_new.txt")
        shell: Rscript {0}

      - name: Commit and push if updated
        run: |
          N_NEW=$(cat n_new.txt)
          rm -f n_new.txt
          if [ "$N_NEW" -gt 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add inst/extdata/gao_links.rds
            git commit -m "update gao links (+${N_NEW} new)"
            git push
          else
            echo "No changes to commit"
          fi
