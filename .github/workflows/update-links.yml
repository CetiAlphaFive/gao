name: Update GAO Links

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 6am UTC
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install curl-impersonate
        run: |
          curl -L -o curl-impersonate.tar.gz \
            https://github.com/lexiforest/curl-impersonate/releases/download/v1.5.1/curl-impersonate-v1.5.1.x86_64-linux-gnu.tar.gz
          mkdir -p $HOME/.local/bin
          tar -xzf curl-impersonate.tar.gz -C $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          curl_firefox147 --version

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::remotes, any::pdftools

      - name: Update links and backfill metadata
        run: |
          library(gao)
          known <- gao_links()
          updated <- gao:::update_links(verbose = TRUE, sleep_time = 1)
          n.new <- nrow(updated) - nrow(known)
          tmp.dir <- tempdir()

          # ── Phase 1: Process new reports ──
          if (n.new > 0) {
            new.idx <- which(!updated$url %in% known$url)

            for (i in new.idx) {
              report.url <- updated$url[i]

              ## Backfill metadata from individual report page
              tryCatch({
                page <- gao:::.fetch_html(report.url)
                meta <- gao:::.scrape_report_metadata(page)
                updated$topics[i]              <- if (is.na(meta$topics)) "" else meta$topics
                updated$subject_terms[i]       <- if (is.na(meta$subject_terms)) "" else meta$subject_terms
                updated$has_recommendations[i] <- meta$has_recommendations
                updated$n_recommendations[i]   <- meta$n_recommendations
                updated$has_matters[i]         <- meta$has_matters
                updated$n_matters[i]           <- meta$n_matters
                updated$agencies_affected[i]   <- if (is.na(meta$agencies_affected)) "" else meta$agencies_affected
              }, error = function(e) {
                message("metadata failed for ", report.url, ": ", e$message)
              })
              Sys.sleep(1)

              ## Backfill page_count from PDF
              pdf.url <- paste0(
                sub("/products/", "/assets/", report.url), ".pdf"
              )
              pdf.path <- file.path(tmp.dir, basename(pdf.url))
              tryCatch({
                gao:::download_pdfs(pdf.url, download_dir = tmp.dir, sleep_time = 1)
                if (file.exists(pdf.path)) {
                  updated$page_count[i] <- pdftools::pdf_length(pdf.path)
                  unlink(pdf.path)
                }
              }, error = function(e) {
                message("page_count failed for ", report.url, ": ", e$message)
              })
            }
            message("Added ", n.new, " new reports")
          } else {
            message("No new reports found")
          }

          # ── Phase 2: Gap-fill existing reports with missing metadata ──
          BATCH_SIZE <- 1000L
          gap.idx <- which(is.na(updated$topics))
          if (n.new > 0) gap.idx <- setdiff(gap.idx, new.idx)
          # Prioritize recent reports first
          gap.idx <- gap.idx[order(updated$published[gap.idx], decreasing = TRUE)]
          n.to.fill <- min(length(gap.idx), BATCH_SIZE)
          n.filled <- 0L

          if (n.to.fill > 0) {
            message("Gap-filling ", n.to.fill, " of ", length(gap.idx), " reports")
            for (i in gap.idx[seq_len(n.to.fill)]) {
              tryCatch({
                page <- gao:::.fetch_html(updated$url[i])
                meta <- gao:::.scrape_report_metadata(page)
                updated$topics[i]              <- if (is.na(meta$topics)) "" else meta$topics
                updated$subject_terms[i]       <- if (is.na(meta$subject_terms)) "" else meta$subject_terms
                updated$has_recommendations[i] <- meta$has_recommendations
                updated$n_recommendations[i]   <- meta$n_recommendations
                updated$has_matters[i]         <- meta$has_matters
                updated$n_matters[i]           <- meta$n_matters
                updated$agencies_affected[i]   <- if (is.na(meta$agencies_affected)) "" else meta$agencies_affected
                n.filled <- n.filled + 1L
              }, error = function(e) {
                message("gap-fill failed: ", updated$url[i], ": ", e$message)
              })
              Sys.sleep(1)

              # Page count if missing
              if (is.na(updated$page_count[i])) {
                pdf.url <- paste0(sub("/products/", "/assets/", updated$url[i]), ".pdf")
                pdf.path <- file.path(tmp.dir, basename(pdf.url))
                tryCatch({
                  gao:::download_pdfs(pdf.url, download_dir = tmp.dir, sleep_time = 1)
                  if (file.exists(pdf.path)) {
                    updated$page_count[i] <- pdftools::pdf_length(pdf.path)
                    unlink(pdf.path)
                  }
                }, error = function(e) {
                  message("gap-fill page_count failed: ", e$message)
                })
              }
            }
            message("Gap-filled ", n.filled, " reports")
          }

          # ── Phase 3: Save if anything changed ──
          if (n.new > 0 || n.filled > 0) {
            core.cols <- c("url", "title", "report_id", "published", "released",
                           "summary", "page_count", "topics", "subject_terms",
                           "has_recommendations", "n_recommendations",
                           "has_matters", "n_matters", "agencies_affected")
            updated <- updated[, intersect(core.cols, names(updated)), drop = FALSE]
            saveRDS(updated, "inst/extdata/gao_links.rds", compress = "xz")
          }

          # Write outputs for conditional commit step
          writeLines(as.character(n.new), "n_new.txt")
          writeLines(as.character(n.filled), "n_filled.txt")
        shell: Rscript {0}

      - name: Commit and push if updated
        id: commit
        run: |
          N_NEW=$(cat n_new.txt)
          N_FILLED=$(cat n_filled.txt)
          rm -f n_new.txt n_filled.txt
          if [ "$N_NEW" -gt 0 ] || [ "$N_FILLED" -gt 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add inst/extdata/gao_links.rds
            if [ "$N_NEW" -gt 0 ] && [ "$N_FILLED" -gt 0 ]; then
              MSG="update gao links (+${N_NEW} new, ${N_FILLED} gaps filled)"
            elif [ "$N_NEW" -gt 0 ]; then
              MSG="update gao links (+${N_NEW} new)"
            else
              MSG="backfill gao metadata (${N_FILLED} gaps filled)"
            fi
            git commit -m "$MSG"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload data to release
        if: steps.commit.outputs.committed == 'true'
        run: |
          gh release upload data-latest inst/extdata/gao_links.rds --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
